name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/sample_app .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/sample_app

      - name: Deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            # create network (safe if exists)
            sudo docker network create my-network || true

            # run mongo if not exists
            sudo docker ps -a --format '{{.Names}}' | grep -q '^mongo$' || \
            sudo docker run -d --name mongo --network my-network mongo:6

            # stop old app
            sudo docker stop sample_app || true
            sudo docker rm sample_app || true

            # pull latest image
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sample_app:latest

            # run app with DB connection
            sudo docker run -d -p 3001:3001 \
              --name sample_app \
              --network my-network \
              -e MONGO_URI=mongodb://mongo:27017/sample_app \
              ${{ secrets.DOCKER_USERNAME }}/sample_app:latest